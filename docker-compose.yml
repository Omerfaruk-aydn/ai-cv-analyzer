version: "3.9"

services:
  backend:
    build: ./backend
    container_name: cv_analyzer_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: cv_analyzer_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
